<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f3efe8" />
    <title>Atelier — 記録する</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body data-page="record">
    <div class="app-bg" aria-hidden="true"></div>

    <div class="app-shell app-shell--enter">
      <header class="app-header">
        <div class="app-header__top">
          <div class="app-header__titles">
            <p class="app-header__title">記録する</p>
            <p class="app-header__subtitle">
              今日の一区切りを、静かに残します。
            </p>
          </div>
          <button
            type="button"
            class="app-header__icon"
            id="menu-toggle"
            aria-label="メニューを開く"
            aria-expanded="false"
            aria-controls="drawer"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M5 7h14M5 12h14M5 17h14"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </header>

      <main class="app-main" id="main">
        <div class="page-placeholder">
          <h2>創作に触れたことを記録</h2>
          <p>
            仕様に沿った入力フォームは、この後ここに実装します。見た目だけトップページと揃えています。
          </p>
          <div class="paper-card">
            <p style="margin: 0; font-size: 0.9rem; color: var(--text-muted)">
              保存すると表示されるのは、次の一文だけです。
              <br />
              <strong style="color: var(--text)">「今日も創作に触れました」</strong>
            </p>
          </div>
        </div>
      </main>

      <nav class="app-nav" aria-label="メインナビゲーション">
        <a class="app-nav__link" href="/">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M5 10.5 12 4l7 6.5V19a1 1 0 01-1 1h-5v-6H11v6H6a1 1 0 01-1-1v-8.5z"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linejoin="round"
            />
          </svg>
          ホーム
        </a>
        <a class="app-nav__link app-nav__link--active" href="/record.html" aria-current="page">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M5 19l4-14 3 8 2-5 5 11"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          記録する
        </a>
        <a class="app-nav__link" href="/settings.html">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 15.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z"
              stroke="currentColor"
              stroke-width="1.6"
            />
            <path
              d="M19 12h2M3 12h2m14.5-5.5l1.4-1.4M5.1 18.4 3.7 19.8M18.4 5.1 19.8 3.7M12 3v2m0 14v2m5.5-14.5l1.4-1.4M5.1 5.1 3.7 3.7M18.4 18.4l1.4 1.4"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
            />
          </svg>
          設定
        </a>
      </nav>
    </div>

    <div class="app-drawer-overlay" id="drawer-overlay" aria-hidden="true"></div>
    <aside class="app-drawer" id="drawer" aria-label="メニュー">
      <p class="app-drawer__title">メニュー</p>
      <a href="/">ホーム</a>
      <a href="/record.html">記録する</a>
      <a href="/settings.html">設定</a>
    </aside>

    <script src="/js/app-shell.js" defer></script>
  </body>
</html>
